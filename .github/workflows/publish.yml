name: osc-cost crate.io publishing

on:
  release:
    types: [released]

permissions:
  contents: read
  id-token: write  

jobs:
  publish:
    environment: publish
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: rust-lang/crates-io-auth-action@9f93ac2286e4f1a6e86b5f77b890fda4566f5c03
      id: auth
    - name: Cargo publish
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
