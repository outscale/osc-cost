version: '3'
services:
  prometheus:
    image: prom/prometheus@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
    networks:
      - localprom
    ports:
      - 9090:9090
  osc-cost:
    image: outscale/osc-cost:v0.8.0
    networks:
      - localprom
    ports:
      - 8080:8080
    # Replace with your AK/SK
    # environment:
     # OSC_ACCESS_KEY: OSC_ACCESS_KEY
     # OSC_SECRET_KEY: OSC_SECRET_KEY
     # OSC_REGION: OSC_REGION     
  node-exporter:
    image: prom/node-exporter@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    networks:
      - localprom
    ports:
      - 9100:9100
networks:
  localprom:
    driver: bridge
